<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Orion</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header id="title">Home</header>

<main>

<section id="home" class="screen active">
  <div class="balance">
    <span>Saldo total</span>
    <h1 id="balance">R$ 0.00</h1>
  </div>

  <div class="summary">
    <div>Entradas<br><b id="inTotal">0</b></div>
    <div>Saídas<br><b id="outTotal">0</b></div>
  </div>

  <div id="accounts" class="accounts"></div>
</section>

<section id="transactions" class="screen">
  <div class="card">
    <form id="form">
      <input id="desc" placeholder="Descrição">
      <input id="value" type="number" placeholder="Valor">

      <select id="type">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account">
        <option>Bradesco</option>
        <option>Inter</option>
        <option>Mercado Pago</option>
        <option>VR</option>
      </select>

      <button type="submit">Adicionar</button>
    </form>
  </div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>
</section>

<section id="debts" class="screen">
  <div class="card">
    <input id="d_name" placeholder="Nome">
    <input id="d_valor" type="number" placeholder="Parcela">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_pago" type="number" placeholder="Pagas">

    <button onclick="addDebt()">Salvar</button>
  </div>

  <div id="debtList"></div>
</section>

<section id="accountsScreen" class="screen">
  <div class="card">
    <button onclick="resetAll()">Resetar tudo</button>
  </div>
</section>

</main>

<nav class="tabbar">
  <button data-tab="home" class="active">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="debts">📉</button>
  <button data-tab="accountsScreen">💳</button>
</nav>

<script src="app.js"></script>

</body>
</html>
