<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Orion Finance</title>

<!-- 🔥 PWA / APP -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- 🔥 iOS FULLSCREEN -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Orion">
<link rel="apple-touch-icon" href="icon.png">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="topbar">
  <header id="title">Home</header>

  <div class="top-actions">
    <button id="eyeBtn">👁️</button>
    <button id="settingsBtn">⚙️</button>
  </div>
</div>

<main>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="balance">
    <span>Saldo total</span>
    <h1 id="balance">R$ 0,00</h1>
  </div>

  <div class="summary">
    <div>
      <span>Entradas</span><br>
      <strong id="inTotal">R$ 0,00</strong>
    </div>
    <div>
      <span>Saídas</span><br>
      <strong id="outTotal">R$ 0,00</strong>
    </div>
  </div>

  <div id="accounts" class="accounts"></div>
</section>

<!-- LANÇAMENTOS -->
<section id="transactions" class="screen">

  <div id="transactionView">

    <div class="card">
      <form id="form" onsubmit="return false;">

        <input id="desc" placeholder="Descrição" required>
        <input id="value" type="number" inputmode="decimal" placeholder="Valor" required>

        <select id="type">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <select id="account">
          <option>Bradesco</option>
          <option>Banco Inter</option>
          <option>Mercado Pago</option>
          <option>VR</option>
        </select>

        <select id="category">
          <option>Salário</option>
          <option>Mercado</option>
          <option>Investimentos</option>
          <option>Rendimentos</option>
          <option>Outros</option>
        </select>

        <label style="display:flex; align-items:center; gap:8px;">
          <input type="checkbox" id="useCard">
          <span>Usar cartão</span>
        </label>

        <input 
          id="installments" 
          type="number" 
          min="1" 
          placeholder="Parcelas"
          style="display:none;"
        >

        <button type="submit">Adicionar</button>

      </form>
    </div>

    <div style="padding:10px;">
      <button id="btnExtract" style="background:#374151;color:#fff;">
        Ver extrato
      </button>
    </div>

  </div>

  <div id="extractView" style="display:none;">

    <div style="padding:10px;">
      <button id="btnBackExtract" style="background:#374151;color:#fff;">
        ← Voltar
      </button>
    </div>

    <div style="padding:10px;">
      <input 
        id="searchInput" 
        placeholder="Buscar..."
        style="width:100%; padding:10px; border-radius:10px; border:none;"
      >
    </div>

    <div class="list-box">
      <ul id="list"></ul>
    </div>

  </div>

</section>

<!-- DASHBOARD -->
<section id="dashboard" class="screen">
  <div class="card">
    <h3>Visão geral</h3>

    <div style="display:flex; flex-direction:column; gap:10px;">

      <div class="card">
        <span>Saldo real</span>
        <strong id="dashReal">R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Total em contas</span>
        <strong id="dashTotal">R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Gastos no mês</span>
        <strong id="dashOut">R$ 0,00</strong>
      </div>

      <canvas id="dashChart" height="180"></canvas>

    </div>

  </div>
</section>

<!-- DÍVIDAS -->
<section id="debts" class="screen">
  <div class="card">
    <input id="d_name" placeholder="Nome">
    <input id="d_valor" type="number" placeholder="Valor">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_pago" type="number" placeholder="Pago">
    <button id="btnAddDebt">Salvar</button>
  </div>

  <div id="debtList" class="list-box"></div>
</section>

<!-- 💳 CARTÃO -->
<section id="card" class="screen">

  <div class="card">
    <strong>Cartão Inter</strong>

    <div style="margin-top:10px;">
      Limite<br>
      <strong id="cardLimit">R$ 0,00</strong>
    </div>

    <div style="margin-top:10px;">
      Disponível<br>
      <strong id="cardAvailable">R$ 0,00</strong>
    </div>

    <div style="margin-top:10px;">
      Usado<br>
      <strong id="cardUsed">R$ 0,00</strong>
    </div>
  </div>

  <div class="card">
    <strong>Faturas</strong>
    <div id="cardInvoices"></div>
  </div>

</section>

</main>

<!-- TABBAR -->
<div class="tabbar">
  <button data-tab="home" class="active">🏠<span>Home</span></button>
  <button data-tab="transactions">💸<span>Lançar</span></button>
  <button data-tab="dashboard">📊<span>Dashboard</span></button>
  <button data-tab="debts">📄<span>Dívidas</span></button>
  <button data-tab="card">💳<span>Cartão</span></button>
</div>

<!-- CORE -->
<script src="js/core/db.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/state.js"></script>

<!-- MODULES -->
<script src="js/modules/accounts.js"></script>
<script src="js/modules/transactions.js"></script>
<script src="js/modules/debts.js"></script>
<script src="js/modules/credit.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/ui.js"></script>

<!-- APP -->
<script src="js/app.js"></script>

<!-- 🔥 SCRIPT PARCELAMENTO -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const useCard = document.getElementById("useCard");
  const installments = document.getElementById("installments");

  if(useCard && installments){
    useCard.addEventListener("change", () => {
      installments.style.display = useCard.checked ? "block" : "none";
    });
  }
});
</script>

</body>
</html>
