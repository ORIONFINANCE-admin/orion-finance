<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Orion</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

<header>
  <h1 id="title">Home</h1>
</header>

<main>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="grid">

    <div class="card">
      <span>Saldo</span>
      <h2 id="balance">R$ 0</h2>
    </div>

    <div class="card">
      <span>Entradas</span>
      <h3 id="inTotal">R$ 0</h3>
    </div>

    <div class="card">
      <span>Saídas</span>
      <h3 id="outTotal">R$ 0</h3>
    </div>

  </div>

  <div id="accounts" class="accounts-row"></div>
</section>

<!-- LANÇAMENTOS -->
<section id="transactions" class="screen">

  <div class="card">
    <form id="form">
      <input id="desc" placeholder="Descrição">
      <input id="value" type="number" inputmode="decimal" placeholder="Valor">

      <select id="type">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account">
        <option>Bradesco</option>
        <option>Banco Inter</option>
        <option>Mercado Pago</option>
        <option>VR</option>
      </select>

      <select id="category">
        <option>Salário</option>
        <option>Mercado</option>
        <option>Investimentos</option>
        <option>Rendimentos</option>
        <option>Outros</option>
      </select>

      <button id="submitBtn">Adicionar</button>
    </form>
  </div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>

</section>

<!-- DÍVIDAS -->
<section id="debts" class="screen">

  <div class="card">
    <input id="d_name" placeholder="Nome">
    <input id="d_value" type="number" placeholder="Parcela">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_paid" type="number" placeholder="Pagas">
    <button onclick="addDebt()">Salvar</button>
  </div>

  <div class="list-box" id="debtList"></div>

</section>

<!-- CONTAS -->
<section id="accountsScreen" class="screen">

  <div class="card">
    <input id="acc_name" placeholder="Nome da conta">
    <input id="acc_color" placeholder="Cor (#)">
    <input id="acc_last" placeholder="Últimos 4 dígitos">

    <select id="acc_type">
      <option>Crédito</option>
      <option>Débito</option>
    </select>

    <button>Salvar</button>
  </div>

  <div class="card">
    <button onclick="resetAll()">Resetar tudo</button>
  </div>

</section>

</main>

<nav class="tabbar">
  <button data-tab="home" class="active">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="debts">📉</button>
  <button data-tab="accountsScreen">💳</button>
</nav>

</div>

<script src="app.js"></script>

</body>
</html>
