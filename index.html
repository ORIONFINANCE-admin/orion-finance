<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion</title>

<link rel="stylesheet" href="style.css">

<!-- 🔥 GRÁFICO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<header>
  <h1>Orion</h1>
</header>

<main>

<section id="home" class="screen active">
  <div class="card balance">
    <p>Saldo Total</p>
    <h2 id="balance">R$ 0,00</h2>
  </div>

  <div id="accounts"></div>
</section>

<section id="transactions" class="screen">

  <div class="card">
    <form id="form">

      <input id="desc" placeholder="Descrição" required>
      <input id="value" type="number" placeholder="Valor" required>

      <select id="type" required>
        <option value="" disabled selected>Tipo</option>
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account" required>
        <option value="" disabled selected>Conta</option>
      </select>

      <select id="category" required>
        <option value="" disabled selected>Categoria</option>
      </select>

      <button type="submit">Adicionar</button>

    </form>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

</section>

<section id="reports" class="screen">
  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</section>

<section id="debts" class="screen">

  <div class="card">

    <input id="d_name" placeholder="Nome da dívida">
    <input id="d_value" type="number" placeholder="Valor da parcela">
    <input id="d_total" type="number" placeholder="Total de parcelas">
    <input id="d_paid" type="number" placeholder="Parcelas pagas">

    <button onclick="addDebt()">Salvar</button>

  </div>

  <div class="card">
    <ul id="debtList"></ul>
  </div>

</section>

<section id="settings" class="screen">

  <div class="card">

    <input id="a_name" placeholder="Nome da conta">
    <input id="a_color" placeholder="Cor (#)">
    <input id="a_card" placeholder="Últimos 4 dígitos">

    <select id="a_type">
      <option>Crédito</option>
      <option>Débito</option>
      <option>Benefício</option>
    </select>

    <button onclick="addAccount()">Salvar</button>

  </div>

</section>

</main>

<nav class="tabbar">
  <button data-tab="home">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="reports">📊</button>
  <button data-tab="debts">📉</button>
  <button data-tab="settings">⚙️</button>
</nav>

</div>

<script src="app.js"></script>
</body>
</html>
