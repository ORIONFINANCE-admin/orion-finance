<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Orion Finance</title>

<!-- PWA iOS FIX -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orion Finance">
<link rel="apple-touch-icon" href="icon.png">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header id="title">Home</header>

<main>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="balance">
    <span>Saldo total</span>
    <h1 id="balance">R$ 0,00</h1>
  </div>

  <div class="summary">
    <div>
      <span>Entradas</span><br>
      <strong id="inTotal">R$ 0,00</strong>
    </div>
    <div>
      <span>Saídas</span><br>
      <strong id="outTotal">R$ 0,00</strong>
    </div>
  </div>

  <div id="accounts" class="accounts"></div>
  </div>
</section>

<!-- LANÇAMENTOS -->
<section id="transactions" class="screen">

  <!-- VIEW FORM -->
  <div id="transactionView">

    <div class="card">
      <form id="form">

        <input id="desc" placeholder="Descrição" required>

        <input id="value" type="number" inputmode="decimal" placeholder="Valor" required>

        <select id="type">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <select id="account">
          <option>Bradesco</option>
          <option>Banco Inter</option>
          <option>Mercado Pago</option>
          <option>VR</option>
        </select>

        <select id="category">
          <option>Salário</option>
          <option>Mercado</option>
          <option>Investimentos</option>
          <option>Rendimentos</option>
          <option>Outros</option>
        </select>

        <!-- USO DO CARTÃO -->
        <label style="display:flex; align-items:center; gap:8px;">
          <input type="checkbox" id="useCard">
          <span>Usar cartão</span>
        </label>

        <select id="paymentType" style="display:none;">
          <option value="credito">Crédito</option>
          <option value="debito">Débito</option>
        </select>

        <button type="submit">Adicionar</button>

      </form>
    </div>

    <!-- BOTÃO EXTRATO -->
    <div style="padding:10px;">
      <button onclick="showExtract()" style="background:#374151;color:#fff;">
        Ver extrato
      </button>
    </div>

  </div>

  <!-- VIEW EXTRATO -->
  <!-- VIEW EXTRATO -->
<div id="extractView" style="display:none;">

  <div style="padding:10px;">
    <button onclick="hideExtract()" style="background:#374151;color:#fff;">
      ← Voltar
    </button>
  </div>

  <!-- 🔍 BUSCA -->
  <div style="padding:10px;">
    <input 
      id="searchInput" 
      placeholder="Buscar por descrição, conta ou categoria..."
      style="width:100%; padding:10px; border-radius:10px; border:none;"
    >
  </div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>

</div>

</section>

<!-- DÍVIDAS -->
<section id="debts" class="screen">

  <div class="card">
    <input id="d_name" placeholder="Nome">
    <input id="d_valor" type="number" inputmode="numeric" placeholder="Valor da parcela">
    <input id="d_total" type="number" inputmode="numeric" placeholder="Total">
    <input id="d_pago" type="number" inputmode="numeric" placeholder="Parcelas pagas">

    <button onclick="addDebt()">Salvar</button>
  </div>

  <div id="debtList" class="list-box"></div>

</section>

<!-- CONTAS -->
<section id="accountsScreen" class="screen">

  <div class="card">
    <h3>Backup & Segurança</h3>

    <button onclick="exportData()">Salvar backup</button>

    <input type="file" onchange="importData(event)">

    <button onclick="resetAll()">Resetar tudo</button>
  </div>

</section>

</main>

<!-- TABBAR -->
<div class="tabbar">
  <button data-tab="home" class="active">🏠<span>Home</span></button>
  <button data-tab="transactions">💸<span>Lançar</span></button>
  <button data-tab="dashboard">📊<span>Dashboard</span></button>
  <button data-tab="debts">📄<span>Dívidas</span></button>
</div>

<script src="app.js"></script>

</body>
</html>
