<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Orion Finance</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

<header>
  <h1 id="title">Home</h1>
</header>

<main>

<!-- HOME -->
<section id="home" class="screen active">
  <div class="balance">
    <span>Saldo total</span>
    <h1 id="balance">R$ 0.00</h1>
  </div>

  <div class="summary">
    <div>
      <span>Entradas</span>
      <strong id="inTotal">R$ 0</strong>
    </div>
    <div>
      <span>Saídas</span>
      <strong id="outTotal">R$ 0</strong>
    </div>
  </div>

  <div id="accounts" class="accounts"></div>
</section>

<!-- LANÇAMENTOS -->
<section id="transactions" class="screen">

  <div class="card">
    <form id="form">

      <input id="desc" placeholder="Descrição" required>

      <input id="value" type="number" inputmode="decimal" placeholder="Valor" required>

      <select id="type">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account">
        <option>Bradesco</option>
        <option>Banco Inter</option>
        <option>Mercado Pago</option>
        <option>VR</option>
      </select>

      <select id="category">
        <option>Salário</option>
        <option>Mercado</option>
        <option>Investimentos</option>
        <option>Rendimentos</option>
        <option>Outros</option>
      </select>

      <button type="submit">Adicionar</button>

    </form>
  </div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>

</section>

<!-- DÍVIDAS -->
<section id="debts" class="screen">

  <div class="card">
    <input id="d_name" placeholder="Nome">
    <input id="d_parcela" type="number" placeholder="Valor da parcela">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_qtd" type="number" placeholder="Parcelas totais">
    <input id="d_pago" type="number" placeholder="Pagas">

    <button onclick="addDebt()">Salvar</button>
  </div>

  <div id="debtList" class="list-box"></div>

</section>

<!-- CONTAS -->
<section id="accountsScreen" class="screen">

  <div class="card">
    <button onclick="resetAll()">Resetar tudo</button>
  </div>

</section>

</main>

<nav class="tabbar">
  <button data-tab="home" class="active">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="debts">📉</button>
  <button data-tab="accountsScreen">💳</button>
</nav>

</div>

<script src="app.js"></script>

</body>
</html>
