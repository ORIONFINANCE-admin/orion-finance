<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<header>
  <h1>Orion</h1>
</header>

<main>

<section id="home" class="screen active">
  <div class="card balance">
    <p>Saldo</p>
    <h2 id="balance">R$ 0,00</h2>
  </div>
  <div id="accounts"></div>
</section>

<section id="transactions" class="screen">

  <div class="card">
    <form id="form">

      <input id="desc" placeholder="Descrição" required>
      <input id="value" type="number" placeholder="Valor" required>

      <select id="type" required>
        <option value="" disabled selected>Tipo</option>
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account" required>
        <option value="" disabled selected>Conta</option>
      </select>

      <select id="category" required>
        <option value="" disabled selected>Categoria</option>
      </select>

      <button>Adicionar</button>

    </form>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

</section>

<section id="reports" class="screen">
  <div class="card">
    <canvas id="chart"></canvas>
    <p id="emptyChart"></p>
  </div>
</section>

<section id="debts" class="screen">
  <div class="card">

    <input id="d_name" placeholder="Nome">
    <input id="d_value" type="number" placeholder="Parcela">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_paid" type="number" placeholder="Pagas">

    <button onclick="addDebt()">Salvar</button>

  </div>

  <div class="card">
    <ul id="debtList"></ul>
  </div>
</section>

</main>

<nav class="tabbar">
  <button data-tab="home">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="reports">📊</button>
  <button data-tab="debts">📉</button>
</nav>

</div>

<script src="app.js"></script>
</body>
</html>
