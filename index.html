<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">

<title>Orion</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="header">
  <h1 id="title">Home</h1>
</header>

<main class="content">

<section id="home" class="screen active">
  <div class="balance-card">
    <span>Saldo total</span>
    <h2 id="balance">R$ 0,00</h2>
  </div>
  <div id="accounts"></div>
</section>

<section id="transactions" class="screen">

  <div class="card">
    <form id="form">

      <input id="desc" placeholder="Descrição" required>

      <input id="value" type="number" inputmode="decimal" placeholder="Valor" required>

      <div class="row">
        <select id="type" required>
          <option value="" disabled selected>Tipo</option>
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <select id="account" required>
          <option value="" disabled selected>Conta</option>
          <option>Bradesco</option>
          <option>Banco Inter</option>
          <option>Mercado Pago</option>
          <option>VR</option>
        </select>
      </div>

      <select id="category" required>
        <option value="" disabled selected>Categoria</option>
        <option>Salário</option>
        <option>Mercado</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Investimentos</option>
        <option>Rendimentos</option>
        <option>Outros</option>
      </select>

      <button type="submit">Adicionar</button>

    </form>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

</section>

<section id="debts" class="screen">
  <div class="card">

    <input id="d_name" placeholder="Nome">
    <input id="d_value" type="number" placeholder="Parcela">
    <input id="d_total" type="number" placeholder="Total">
    <input id="d_paid" type="number" placeholder="Pagas">

    <button onclick="addDebt()">Salvar</button>

  </div>

  <div class="card">
    <ul id="debtList"></ul>
  </div>
</section>

<section id="accountsScreen" class="screen">
  <div class="card">

    <input id="a_name" placeholder="Nome da conta">
    <input id="a_color" placeholder="Cor (#)">
    <input id="a_card" placeholder="Últimos 4 dígitos">

    <select id="a_type">
      <option>Crédito</option>
      <option>Débito</option>
      <option>Benefício</option>
    </select>

    <button onclick="addAccount()">Salvar</button>

  </div>
</section>

</main>

<nav class="tabbar">
  <button data-tab="home">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="debts">📉</button>
  <button data-tab="accountsScreen">💳</button>
</nav>

</div>

<script src="app.js"></script>
</body>
</html>
