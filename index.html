<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion Finance</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

<header class="header">
  <h1>Orion</h1>
</header>

<main class="screens">

<!-- HOME -->
<section id="home" class="screen active">

  <div class="card balance">
    <p>Saldo Total</p>
    <h2 id="balance">R$ 0</h2>
  </div>

  <div id="accounts"></div>

</section>

<!-- TRANSAÇÕES -->
<section id="transactions" class="screen">

  <div class="card">

    <form id="form">

      <input id="desc" placeholder="Descrição" required>
      <input id="value" type="number" placeholder="Valor" required>

      <select id="type">
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <select id="account"></select>
      <select id="category"></select>

      <button>Adicionar</button>

    </form>

  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>

</section>

<!-- RELATÓRIOS -->
<section id="reports" class="screen">

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</section>

</main>

<nav class="tabbar">
  <button data-tab="home">🏠</button>
  <button data-tab="transactions">💸</button>
  <button data-tab="reports">📊</button>
</nav>

</div>

<script src="app.js"></script>
</body>
</html>
